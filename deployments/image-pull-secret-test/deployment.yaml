apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-pull-secrets-test
spec:
  template:
    metadata:
      labels:
        app: image-pull-secrets-test
    spec:
      containers:
      - name: echo
        image: elifesciences/test-please-ignore:echo
        ports:
        - name: http
          containerPort: 5678
          protocol: TCP
        args:
        - --status-code=401
        resources:
          limits:
            cpu: 10m
            memory: 100Mi
          requests:
            cpu: 10m
            memory: 10Mi
  selector:
    matchLabels:
      app: image-pull-secrets-test
