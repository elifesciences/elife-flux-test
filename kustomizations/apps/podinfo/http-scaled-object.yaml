kind: HTTPScaledObject
apiVersion: http.keda.sh/v1alpha1
metadata:
  name: podinfo
  annotations:
    httpscaledobject.keda.sh/orphan-scaledobject: "true"
spec:
  hosts:
  - "${hostname}"
  pathPrefixes:
  - /
  scaleTargetRef:
    name: podinfo
    kind: Deployment
    apiVersion: apps/v1
    service: podinfo
    port: 9898
  replicas:
    min: 0
    max: 2
  scaledownPeriod: 30
  targetPendingRequests: 5
