---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: mimir
  namespace: monitoring
spec:
  interval: 1m
  releaseName: mimir
  chart:
    spec:
      chart: mimir-distributed
      version: 5.0.0
      sourceRef:
        kind: HelmRepository
        name: grafana
      interval: 1m
  timeout: 5m
  install:
    remediation:
      retries: 5
  update:
    remediation:
      retries: 5
