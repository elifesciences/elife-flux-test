---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: quickwit
spec:
  interval: 1m
  releaseName: quickwit
  chart:
    spec:
      chart: quickwit
      version: 0.5.14
      sourceRef:
        kind: HelmRepository
        name: quickwit
      interval: 1m
  install:
    remediation:
      retries: 5

  values:

    environment:
      QW_METASTORE_URI: s3://<my-bucket>/quickwit-indexes

    config:
      default_index_root_uri: s3://<my-bucket>/quickwit-indexes
      storage:
        s3:
          region: eu-east-1
