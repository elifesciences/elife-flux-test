---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kong-gateway-operator
  namespace: kong-system
spec:
  interval: 5m
  chart:
    spec:
      chart: gateway-operator
      version: 0.6.1
      sourceRef:
        kind: HelmRepository
        name: kong
      interval: 1m
  values:
    image:
      tag: "1.4.2"
    # kube-rbac-proxy is deprecated. You should probably check if this is even still used by kong-gateway-operator and remove if not
    kubeRBACProxy:
      image: registry.k8s.io/kubebuilder/kube-rbac-proxy
