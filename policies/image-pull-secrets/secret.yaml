apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: image-pull-secrets
  namespace: kyverno
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: secret-store
    kind: ClusterSecretStore
  target:
    name: image-pull-secrets
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"https://index.docker.io/v1/":{"auth":"{{ printf "%s:%s" .docker_user .docker_token | b64enc }}"}}}
  dataFrom:
  - extract:
      key: clusters/${cluster_name}/image-pull-secrets
